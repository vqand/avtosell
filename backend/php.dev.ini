; Minimal php.ini for running the 5VITO API with the winget PHP build.
; Pass to PHP via:  php -c php.dev.ini -S localhost:8080 -t public public/router.php
extension_dir = "C:\Users\Компьютер\AppData\Local\Microsoft\WinGet\Packages\PHP.PHP.8.3_Microsoft.Winget.Source_8wekyb3d8bbwe\ext"

extension=pdo_mysql
extension=mysqli
extension=fileinfo
extension=mbstring
extension=openssl

display_errors = On
error_reporting = E_ALL
upload_max_filesize = 8M
post_max_size = 10M
